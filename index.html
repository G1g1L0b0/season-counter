<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Countdown</title>

<style>
body {
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
}

/* TITLE (clean now) */
h1 {
  font-size: 48px;
  letter-spacing: 4px;
  margin-bottom: 70px;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 40px;
}

/* EACH BLOCK */
.time-block {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* BOX */
.box {
  background: #1a1a1a;
  width: 130px;
  height: 110px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;

  box-shadow:
    0 0 15px rgba(255,0,0,0.15),
    inset 0 0 10px rgba(255,255,255,0.05);
}

/* middle line */
.box::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: black;
  opacity: 0.7;
}

/* NUMBER PERFECT CENTER */
.number {
  font-size: 48px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(255,0,0,0.5);
}

/* LABEL OUTSIDE */
.label {
  margin-top: 15px;
  font-size: 14px;
  color: #ff4d4d;
  letter-spacing: 3px;
}

/* FLIP */
.flip {
  animation: flip 0.4s ease;
}

@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
</style>

</head>
<body>

<h1>COMING SOON</h1>

<div class="container">

  <div class="time-block">
    <div class="box">
      <div id="days" class="number">00</div>
    </div>
    <div class="label">DAYS</div>
  </div>

  <div class="time-block">
    <div class="box">
      <div id="hours" class="number">00</div>
    </div>
    <div class="label">HOURS</div>
  </div>

  <div class="time-block">
    <div class="box">
      <div id="minutes" class="number">00</div>
    </div>
    <div class="label">MINUTES</div>
  </div>

  <div class="time-block">
    <div class="box">
      <div id="seconds" class="number">00</div>
    </div>
    <div class="label">SECONDS</div>
  </div>

</div>

<script>
const endDate = new Date("2026-06-01 00:00:00").getTime();
let lastValues = {};

function updateCountdown() {
  const now = new Date().getTime();
  const diff = endDate - now;

  const values = {
    days: Math.floor(diff / (1000 * 60 * 60 * 24)),
    hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
    minutes: Math.floor((diff / (1000 * 60)) % 60),
    seconds: Math.floor((diff / 1000) % 60)
  };

  for (let key in values) {
    const el = document.getElementById(key);

    if (lastValues[key] !== values[key]) {
      el.classList.add("flip");

      setTimeout(() => {
        el.innerText = values[key].toString().padStart(2, "0");
        el.classList.remove("flip");
      }, 200);

      lastValues[key] = values[key];
    }
  }
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
