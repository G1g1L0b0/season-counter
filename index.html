<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Countdown</title>

<!-- FLIPDOWN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.css">
<script src="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.js"></script>

<style>
body {
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
}

/* TITLE */
h1 {
  font-size: 48px;
  letter-spacing: 4px;
  margin-bottom: 70px;
}

/* FIX WHOLE FLIPDOWN LAYOUT */
.flipdown {
  display: flex;
  justify-content: center;
  gap: 30px;
}

/* EACH UNIT (days/hours etc) */
.flipdown .rotor-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* KEEP ONLY ONE ROW (FIX STACK BUG) */
.flipdown .rotor-group .rotor {
  margin: 0;
}

/* STYLE BOX */
.flipdown .rotor {
  background: #1a1a1a !important;
  border-radius: 12px;
  box-shadow:
    0 0 12px rgba(255,0,0,0.15),
    inset 0 0 8px rgba(255,255,255,0.05);
}

/* FIX NUMBER SIZE */
.flipdown .rotor-top,
.flipdown .rotor-bottom {
  font-size: 42px !important;
  color: white;
  text-shadow: 0 0 8px rgba(255,0,0,0.5);
}

/* REMOVE EXTRA STACK EFFECT */
.flipdown .rotor-leaf {
  display: none;
}

/* LABELS UNDER */
.flipdown .rotor-group-heading {
  margin-top: 15px;
  color: #ff4d4d !important;
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* REMOVE DOTS */
.flipdown .rotor-group:nth-child(2)::after,
.flipdown .rotor-group:nth-child(3)::after {
  display: none;
}
</style>

</head>
<body>

<h1>COMING SOON</h1>

<div id="flipdown" class="flipdown"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  const endDate = new Date("2026-06-01 00:00:00").getTime() / 1000;

  new FlipDown(endDate)
    .start()
    .ifEnded(() => {
      document.getElementById("flipdown").innerHTML = "<h2>Season Ended</h2>";
    });

});
</script>

</body>
</html>
