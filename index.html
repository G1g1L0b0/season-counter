<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Countdown</title>

<!-- FLIPDOWN LIBRARY -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.css">
<script src="https://cdn.jsdelivr.net/npm/flipdown@0.3.2/dist/flipdown.min.js"></script>

<style>
body {
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
}

/* TITLE */
h1 {
  font-size: 48px;
  letter-spacing: 4px;
  margin-bottom: 70px;
}

/* FLIP CONTAINER */
#flipdown {
  margin: 0 auto;
}

/* LABELS (DAYS, HOURS...) */
.flipdown .rotor-group-heading {
  color: #ff4d4d !important;
  letter-spacing: 2px;
  margin-top: 15px;
}

/* BOX STYLE */
.flipdown .rotor {
  background: #1a1a1a !important;
  border-radius: 15px;
  box-shadow:
    0 0 15px rgba(255,0,0,0.2),
    inset 0 0 10px rgba(255,255,255,0.05);
}

/* NUMBERS */
.flipdown .rotor-top,
.flipdown .rotor-bottom {
  color: white;
  font-size: 48px;
  text-shadow: 0 0 10px rgba(255,0,0,0.5);
}

/* CENTER LINE EFFECT */
.flipdown .rotor:after {
  content: "";
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: black;
  opacity: 0.7;
}
</style>

</head>
<body>

<h1>COMING SOON</h1>

<div id="flipdown" class="flipdown"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {

  // ΒΑΛΕ ΤΗΝ ΗΜΕΡΟΜΗΝΙΑ ΣΟΥ ΕΔΩ
  const endDate = new Date("2026-06-01 00:00:00").getTime() / 1000;

  new FlipDown(endDate)
    .start()
    .ifEnded(() => {
      document.getElementById("flipdown").innerHTML = "<h2>Season Ended</h2>";
    });

});
</script>

</body>
</html>
