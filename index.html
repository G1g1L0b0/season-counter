<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flip Countdown</title>

<style>
body {
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
}

h1 {
  font-size: 48px;
  margin-bottom: 60px;
  letter-spacing: 4px;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 30px;
}

/* EACH UNIT */
.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* FLIP CARD */
.flip-card {
  position: relative;
  width: 90px;
  height: 100px;
  perspective: 300px;
}

/* TOP & BOTTOM */
.top, .bottom {
  position: absolute;
  width: 100%;
  height: 50%;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  border-radius: 10px;
  overflow: hidden;
}

/* TOP */
.top {
  top: 0;
  border-bottom: 1px solid #000;
}

/* BOTTOM */
.bottom {
  bottom: 0;
  border-top: 1px solid #000;
}

/* CENTER LINE */
.flip-card::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: black;
}

/* LABEL */
.label {
  margin-top: 12px;
  color: #ff4d4d;
  font-size: 14px;
  letter-spacing: 2px;
}

/* FLIP ANIMATION */
.flip .top {
  animation: flipTop 0.4s forwards;
}

.flip .bottom {
  animation: flipBottom 0.4s forwards;
}

@keyframes flipTop {
  0% { transform: rotateX(0); }
  100% { transform: rotateX(-90deg); }
}

@keyframes flipBottom {
  0% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
</style>

</head>
<body>

<h1>COMING SOON</h1>

<div class="container">

  <div class="unit">
    <div class="flip-card" id="days">
      <div class="top">00</div>
      <div class="bottom">00</div>
    </div>
    <div class="label">DAYS</div>
  </div>

  <div class="unit">
    <div class="flip-card" id="hours">
      <div class="top">00</div>
      <div class="bottom">00</div>
    </div>
    <div class="label">HOURS</div>
  </div>

  <div class="unit">
    <div class="flip-card" id="minutes">
      <div class="top">00</div>
      <div class="bottom">00</div>
    </div>
    <div class="label">MINUTES</div>
  </div>

  <div class="unit">
    <div class="flip-card" id="seconds">
      <div class="top">00</div>
      <div class="bottom">00</div>
    </div>
    <div class="label">SECONDS</div>
  </div>

</div>

<script>
const endDate = new Date("2026-06-01 00:00:00");

function update() {
  const now = new Date();
  const diff = endDate - now;

  const values = {
    days: Math.floor(diff / (1000 * 60 * 60 * 24)),
    hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
    minutes: Math.floor((diff / (1000 * 60)) % 60),
    seconds: Math.floor((diff / 1000) % 60)
  };

  for (let key in values) {
    const el = document.getElementById(key);
    const top = el.querySelector(".top");
    const bottom = el.querySelector(".bottom");

    const newVal = values[key].toString().padStart(2, "0");

    if (top.textContent !== newVal) {
      el.classList.add("flip");

      setTimeout(() => {
        top.textContent = newVal;
        bottom.textContent = newVal;
        el.classList.remove("flip");
      }, 200);
    }
  }
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
