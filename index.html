<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flip Countdown</title>

<style>
body {
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  font-family: Arial;
  text-align: center;
  padding-top: 80px;
}

h1 {
  font-size: 48px;
  margin-bottom: 60px;
  letter-spacing: 4px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.digits {
  display: flex;
  gap: 8px;
}

/* CARD */
.card {
  position: relative;
  width: 60px;
  height: 80px;
  background: #1a1a1a;
  border-radius: 8px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 36px;
  overflow: hidden;
}

/* LINE */
.card::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: black;
}

/* FLIP OVERLAY */
.flip-overlay {
  position: absolute;
  width: 100%;
  height: 50%;
  top: 0;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  transform-origin: bottom;
}

.flip {
  animation: flip 0.4s ease;
}

@keyframes flip {
  to { transform: rotateX(-90deg); }
}

.label {
  margin-top: 12px;
  color: #ff4d4d;
  font-size: 14px;
  letter-spacing: 2px;
}
</style>

</head>
<body>

<h1>ENDING SOON</h1>

<div class="container">

  <div class="unit">
    <div class="digits" id="days"></div>
    <div class="label">DAYS</div>
  </div>

  <div class="unit">
    <div class="digits" id="hours"></div>
    <div class="label">HOURS</div>
  </div>

  <div class="unit">
    <div class="digits" id="minutes"></div>
    <div class="label">MINUTES</div>
  </div>

  <div class="unit">
    <div class="digits" id="seconds"></div>
    <div class="label">SECONDS</div>
  </div>

</div>

<script>
const endDate = new Date("2026-10-30 16:00:00");

function createCard() {
  const card = document.createElement("div");
  card.className = "card";
  card.textContent = "0";
  return card;
}

function ensureDigits(container, length) {
  while (container.children.length < length) {
    container.prepend(createCard());
  }
}

let last = {};

function flip(card, newDigit) {
  const overlay = document.createElement("div");
  overlay.className = "flip-overlay";
  overlay.textContent = card.textContent;

  card.appendChild(overlay);

  requestAnimationFrame(() => {
    overlay.classList.add("flip");
  });

  setTimeout(() => {
    card.textContent = newDigit;
    card.removeChild(overlay);
  }, 400);
}

function update() {
  const now = new Date();
  const diff = endDate - now;

  const values = {
    days: Math.floor(diff / (1000*60*60*24)).toString(),
    hours: Math.floor((diff/(1000*60*60))%24).toString().padStart(2,"0"),
    minutes: Math.floor((diff/(1000*60))%60).toString().padStart(2,"0"),
    seconds: Math.floor((diff/1000)%60).toString().padStart(2,"0")
  };

  for (let key in values) {
    const str = values[key];
    const container = document.getElementById(key);

    ensureDigits(container, str.length);

    const cards = container.children;

    str.split("").forEach((digit,i) => {
      if (!last[key] || last[key][i] !== digit) {
        flip(cards[i], digit);
      }
    });

    last[key] = str;
  }
}

setInterval(update,1000);
update();
</script>

</body>
</html>
