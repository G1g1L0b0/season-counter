<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Countdown</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 80px;
}

h1 {
  font-size: 40px;
  margin-bottom: 40px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.box {
  background: #222;
  padding: 20px;
  border-radius: 10px;
  width: 100px;
}

.number {
  font-size: 40px;
  font-weight: bold;
}

.label {
  margin-top: 10px;
  font-size: 14px;
  color: #aaa;
}
</style>

</head>
<body>

<h1>COMING SOON</h1>

<div class="container">
  <div class="box">
    <div id="days" class="number">00</div>
    <div class="label">DAYS</div>
  </div>

  <div class="box">
    <div id="hours" class="number">00</div>
    <div class="label">HOURS</div>
  </div>

  <div class="box">
    <div id="minutes" class="number">00</div>
    <div class="label">MINUTES</div>
  </div>

  <div class="box">
    <div id="seconds" class="number">00</div>
    <div class="label">SECONDS</div>
  </div>
</div>

<script>
const endDate = new Date("2026-06-01 00:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = endDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
