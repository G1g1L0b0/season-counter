<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Season Countdown</title>

<style>
body {
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  font-family: 'Arial', sans-serif;
  text-align: center;
  padding-top: 80px;
}

/* TITLE */
h1 {
  font-size: 50px;
  letter-spacing: 3px;
  color: #fff;
  text-shadow: 0 0 10px red;
  margin-bottom: 60px;
}

/* CONTAINER */
.container {
  display: flex;
  justify-content: center;
  gap: 30px;
}

/* BOX */
.box {
  background: #1a1a1a;
  padding: 25px;
  border-radius: 15px;
  width: 120px;
  position: relative;
  box-shadow: 
    0 0 10px rgba(255,0,0,0.2),
    inset 0 0 15px rgba(255,255,255,0.05);
}

/* LINE IN MIDDLE */
.box::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  background: #000;
  opacity: 0.6;
}

/* NUMBER */
.number {
  font-size: 50px;
  font-weight: bold;
  text-shadow: 0 0 10px rgba(255,0,0,0.6);
  transition: transform 0.3s;
}

/* FLIP EFFECT */
.flip {
  animation: flip 0.4s ease;
}

@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}

/* LABEL */
.label {
  margin-top: 12px;
  font-size: 14px;
  color: #ff4d4d;
  letter-spacing: 2px;
}
</style>

</head>
<body>

<h1>ENDING SOON</h1>

<div class="container">
  <div class="box">
    <div id="days" class="number">00</div>
    <div class="label">DAYS</div>
  </div>

  <div class="box">
    <div id="hours" class="number">00</div>
    <div class="label">HOURS</div>
  </div>

  <div class="box">
    <div id="minutes" class="number">00</div>
    <div class="label">MINUTES</div>
  </div>

  <div class="box">
    <div id="seconds" class="number">00</div>
    <div class="label">SECONDS</div>
  </div>
</div>

<script>
const endDate = new Date("2026-10-30 00:00:00").getTime();

let lastValues = {};

function updateCountdown() {
  const now = new Date().getTime();
  const diff = endDate - now;

  const values = {
    days: Math.floor(diff / (1000 * 60 * 60 * 24)),
    hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
    minutes: Math.floor((diff / (1000 * 60)) % 60),
    seconds: Math.floor((diff / 1000) % 60)
  };

  for (let key in values) {
    const el = document.getElementById(key);

    if (lastValues[key] !== values[key]) {
      el.classList.add("flip");

      setTimeout(() => {
        el.innerText = values[key].toString().padStart(2, "0");
        el.classList.remove("flip");
      }, 200);

      lastValues[key] = values[key];
    }
  }
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
