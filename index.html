<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Flip Countdown</title>

<style>
body {
  background: radial-gradient(circle, #111 0%, #000 100%);
  color: white;
  font-family: Arial;
  text-align: center;
  padding-top: 80px;
}

h1 {
  font-size: 48px;
  margin-bottom: 60px;
  letter-spacing: 4px;
}

.container {
  display: flex;
  justify-content: center;
  gap: 40px;
}

.unit {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* DIGITS ROW */
.digits {
  display: flex;
  gap: 8px;
}

/* CARD */
.card {
  position: relative;
  width: 60px;
  height: 80px;
  perspective: 300px;
}

.top, .bottom {
  position: absolute;
  width: 100%;
  height: 50%;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 36px;
  border-radius: 8px;
}

.top {
  top: 0;
  border-bottom: 1px solid #000;
}

.bottom {
  bottom: 0;
  border-top: 1px solid #000;
}

.card::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 100%;
  height: 2px;
  background: black;
}

/* LABEL */
.label {
  margin-top: 12px;
  color: #ff4d4d;
  font-size: 14px;
  letter-spacing: 2px;
}

/* FLIP */
.flip .top {
  animation: flipTop 0.4s forwards;
}
.flip .bottom {
  animation: flipBottom 0.4s forwards;
}

@keyframes flipTop {
  to { transform: rotateX(-90deg); }
}

@keyframes flipBottom {
  from { transform: rotateX(90deg); }
  to { transform: rotateX(0); }
}
</style>

</head>
<body>

<h1>COMING SOON</h1>

<div class="container">

  <!-- DAYS -->
  <div class="unit">
    <div class="digits" id="days"></div>
    <div class="label">DAYS</div>
  </div>

  <!-- HOURS -->
  <div class="unit">
    <div class="digits" id="hours"></div>
    <div class="label">HOURS</div>
  </div>

  <!-- MINUTES -->
  <div class="unit">
    <div class="digits" id="minutes"></div>
    <div class="label">MINUTES</div>
  </div>

  <!-- SECONDS -->
  <div class="unit">
    <div class="digits" id="seconds"></div>
    <div class="label">SECONDS</div>
  </div>

</div>

<script>
const endDate = new Date("2026-06-01 00:00:00");

function createDigit() {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="top">0</div>
    <div class="bottom">0</div>
  `;
  return card;
}

function setup(unit) {
  const el = document.getElementById(unit);
  el.innerHTML = "";
  el.appendChild(createDigit());
  el.appendChild(createDigit());
}

["days","hours","minutes","seconds"].forEach(setup);

let last = {};

function update() {
  const now = new Date();
  const diff = endDate - now;

  const values = {
    days: Math.floor(diff / (1000*60*60*24)),
    hours: Math.floor((diff/(1000*60*60))%24),
    minutes: Math.floor((diff/(1000*60))%60),
    seconds: Math.floor((diff/1000)%60)
  };

  for (let key in values) {
    const str = values[key].toString().padStart(2,"0");
    const container = document.getElementById(key);
    const cards = container.children;

    str.split("").forEach((digit,i) => {
      const card = cards[i];
      const top = card.querySelector(".top");
      const bottom = card.querySelector(".bottom");

      if (!last[key] || last[key][i] !== digit) {

        top.textContent = last[key] ? last[key][i] : digit;
        bottom.textContent = digit;

        card.classList.add("flip");

        setTimeout(()=>{
          top.textContent = digit;
          card.classList.remove("flip");
        },400);
      }
    });

    last[key] = str;
  }
}

setInterval(update,1000);
update();
</script>

</body>
</html>
