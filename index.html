<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Season Countdown</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #111;
      color: white;
      margin-top: 100px;
    }

    h1 {
      font-size: 50px;
    }

    #countdown {
      font-size: 60px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Season Ends In:</h1>
  <div id="countdown">Loading...</div>

  <script>
    // Βάλε εδώ την ημερομηνία που τελειώνει η σεζόν
    const endDate = new Date("2026-06-01");

    function updateCountdown() {
      const now = new Date();
      const diff = endDate - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      document.getElementById("countdown").innerText = days + " days";
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
